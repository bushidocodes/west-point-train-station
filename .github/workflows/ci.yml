name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up GNAT toolchain
        uses: alire-project/setup-alire@v2
        with:
          toolchain: gnat_native gprbuild

      - name: Build
        run: alr exec -- gprbuild -P ticket_program.gpr

      - name: Run tests
        run: alr exec -- ./ticket_sales_tests
